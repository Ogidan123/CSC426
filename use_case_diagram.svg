<svg width="900" height="640" viewBox="0 0 900 640" xmlns="http://www.w3.org/2000/svg" role="img">
<title>IRO use case diagram</title>
<desc>Use case diagram showing Student and Indigene actors interacting with report submission and tracking use cases, and an Administrator actor interacting with review and resolution use cases, inside the IRO system boundary.</desc>
<rect width="900" height="640" fill="#FFFFFF"/>
<text x="450" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1F3864">Use Case Diagram — IRO (Issues Reporting Outlet)</text>

<!-- System boundary -->
<rect x="230" y="55" width="460" height="530" rx="10" fill="#FBFBFB" stroke="#1F3864" stroke-width="1.5"/>
<text x="460" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1F3864">IRO System</text>

<!-- ===== Actors ===== -->
<!-- Student (top left) -->
<g font-family="Arial, sans-serif">
  <circle cx="70" cy="130" r="14" fill="none" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="70" y1="144" x2="70" y2="185" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="45" y1="160" x2="95" y2="160" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="70" y1="185" x2="50" y2="215" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="70" y1="185" x2="90" y2="215" stroke="#2C2C2A" stroke-width="1.5"/>
  <text x="70" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C2C2A">Student</text>
</g>

<!-- Indigene (mid left) -->
<g font-family="Arial, sans-serif">
  <circle cx="70" cy="330" r="14" fill="none" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="70" y1="344" x2="70" y2="385" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="45" y1="360" x2="95" y2="360" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="70" y1="385" x2="50" y2="415" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="70" y1="385" x2="90" y2="415" stroke="#2C2C2A" stroke-width="1.5"/>
  <text x="70" y="432" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C2C2A">Indigene</text>
</g>

<!-- Administrator (right) -->
<g font-family="Arial, sans-serif">
  <circle cx="830" cy="330" r="14" fill="none" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="830" y1="344" x2="830" y2="385" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="805" y1="360" x2="855" y2="360" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="830" y1="385" x2="810" y2="415" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="830" y1="385" x2="850" y2="415" stroke="#2C2C2A" stroke-width="1.5"/>
  <text x="830" y="432" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C2C2A">Administrator</text>
</g>

<!-- ===== Use case ellipses (shared, left side) ===== -->
<g font-family="Arial, sans-serif" font-size="11" fill="#0C447C">
<ellipse cx="330" cy="110" rx="85" ry="28" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
<text x="330" y="114" text-anchor="middle">Register account</text>

<ellipse cx="330" cy="180" rx="85" ry="28" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
<text x="330" y="184" text-anchor="middle">Login / Logout</text>

<ellipse cx="330" cy="250" rx="95" ry="30" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
<text x="330" y="248" text-anchor="middle">Submit issue report</text>
<text x="330" y="262" text-anchor="middle" font-size="10">(category, description, location)</text>

<ellipse cx="330" cy="325" rx="95" ry="28" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
<text x="330" y="329" text-anchor="middle">Track report status</text>

<ellipse cx="330" cy="395" rx="95" ry="28" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
<text x="330" y="399" text-anchor="middle">View resolved issues</text>

<ellipse cx="330" cy="465" rx="95" ry="28" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
<text x="330" y="469" text-anchor="middle">Receive status notification</text>
</g>

<!-- ===== Admin-side use cases (right side, inside boundary) ===== -->
<g font-family="Arial, sans-serif" font-size="11" fill="#712B13">
<ellipse cx="580" cy="150" rx="95" ry="28" fill="#FAECE7" stroke="#993C1D" stroke-width="1.2"/>
<text x="580" y="154" text-anchor="middle">Review all reports</text>

<ellipse cx="580" cy="225" rx="95" ry="28" fill="#FAECE7" stroke="#993C1D" stroke-width="1.2"/>
<text x="580" y="229" text-anchor="middle">Filter / search reports</text>

<ellipse cx="580" cy="300" rx="95" ry="30" fill="#FAECE7" stroke="#993C1D" stroke-width="1.2"/>
<text x="580" y="298" text-anchor="middle">Update status &amp;</text>
<text x="580" y="312" text-anchor="middle">respond to report</text>

<ellipse cx="580" cy="380" rx="95" ry="28" fill="#FAECE7" stroke="#993C1D" stroke-width="1.2"/>
<text x="580" y="384" text-anchor="middle">Generate statistics</text>

<ellipse cx="580" cy="455" rx="95" ry="28" fill="#FAECE7" stroke="#993C1D" stroke-width="1.2"/>
<text x="580" y="459" text-anchor="middle">Manage user accounts</text>
</g>

<!-- ===== Connectors: Student to use cases ===== -->
<g stroke="#5F5E5A" stroke-width="1">
<line x1="98" y1="150" x2="245" y2="115"/>
<line x1="98" y1="150" x2="245" y2="182"/>
<line x1="98" y1="160" x2="235" y2="250"/>
<line x1="98" y1="170" x2="235" y2="325"/>
</g>

<!-- ===== Connectors: Indigene to use cases ===== -->
<g stroke="#5F5E5A" stroke-width="1">
<line x1="98" y1="315" x2="245" y2="185"/>
<line x1="98" y1="325" x2="235" y2="255"/>
<line x1="98" y1="340" x2="245" y2="392"/>
<line x1="98" y1="345" x2="235" y2="465"/>
</g>

<!-- Submit report -> notification (include-ish) -->
<line x1="330" y1="278" x2="330" y2="437" stroke="#5F5E5A" stroke-width="1" stroke-dasharray="4 3"/>

<!-- ===== Connectors: Administrator to admin use cases ===== -->
<g stroke="#5F5E5A" stroke-width="1">
<line x1="802" y1="315" x2="675" y2="160"/>
<line x1="802" y1="325" x2="675" y2="230"/>
<line x1="802" y1="335" x2="675" y2="305"/>
<line x1="802" y1="345" x2="675" y2="382"/>
<line x1="802" y1="360" x2="675" y2="450"/>
</g>

<!-- Submit report -> Review all reports (system-level link) -->
<line x1="425" y1="255" x2="485" y2="180" stroke="#5F5E5A" stroke-width="1" stroke-dasharray="4 3"/>

<text x="455" y="600" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5F5E5A">Dashed lines indicate a system-level relationship between use cases (e.g. a submitted report becomes reviewable, and status changes trigger notifications).</text>
</svg>
